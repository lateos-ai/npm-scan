name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - name: Run tests
      run: npm test
    - name: Run tests with coverage
      run: npm run test:coverage
    - name: Run local corpus tests
      run: node --test test/detectors-corpus.test.js
    - name: Lint check
      run: npm run lint
    - name: Build check
      run: npm run build

  scan-self:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Self-scan lockfile
      uses: ./
      with:
        scan-type: lockfile
        fail-on: high