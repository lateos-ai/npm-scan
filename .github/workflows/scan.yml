name: npm-scan PR check

on:
  pull_request:
    paths:
      - 'package-lock.json'
      - '**/package.json'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Scan lockfile for supply chain threats
      uses: lateos/npm-scan@main
      with:
        scan-type: lockfile
        fail-on: high
        policy-file: .npm-scan.yml
    - name: Upload scan results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: npm-scan-results
        path: npm-scan.db