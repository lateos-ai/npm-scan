apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "npm-scan.name" . }}-api
  labels:
    app: {{ include "npm-scan.name" . }}-api
    {{- include "npm-scan.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: {{ include "npm-scan.name" . }}-api
  template:
    metadata:
      labels:
        app: {{ include "npm-scan.name" . }}-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "api.main"]
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: API_PORT
              value: "{{ .Values.api.port }}"
            - name: API_HOST
              value: "{{ .Values.api.host }}"
            - name: NPM_SCAN_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "npm-scan.name" . }}-license
                  key: key
                  optional: true
            {{- if .Values.postgresql.enabled }}
            - name: PG_HOST
              value: "{{ .Values.postgresql.host }}"
            - name: PG_PORT
              value: "{{ .Values.postgresql.port }}"
            - name: PG_DATABASE
              value: "{{ .Values.postgresql.database }}"
            - name: PG_USERNAME
              value: "{{ .Values.postgresql.username }}"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.existingSecret | default (printf "%s-pg" (include "npm-scan.name" .)) }}
                  key: password
                  optional: true
            {{- end }}
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "npm-scan.name" . }}-api
  labels:
    app: {{ include "npm-scan.name" . }}-api
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.api.port }}
  selector:
    app: {{ include "npm-scan.name" . }}-api