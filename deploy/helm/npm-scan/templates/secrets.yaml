apiVersion: v1
kind: Secret
metadata:
  name: {{ include "npm-scan.name" . }}-license
  labels: {{- include "npm-scan.labels" . | nindent 4 }}
type: Opaque
stringData:
  key: "{{ .Values.license.key }}"
---
{{- if not .Values.postgresql.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "npm-scan.name" . }}-pg
  labels: {{- include "npm-scan.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: "{{ .Values.postgresql.password }}"
{{- end }}