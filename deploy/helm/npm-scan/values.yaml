# Helm values for npm-scan
# Override per environment: helm install -f values-prod.yaml

image:
  repository: ghcr.io/lateos/npm-scan
  tag: latest
  pullPolicy: Always

replicaCount: 1

license:
  # --license-key or NPM_SCAN_LICENSE_KEY env var
  key: ""
  secret: ""

postgresql:
  enabled: true
  host: ""
  port: 5432
  database: npm_scan
  username: npm_scan
  password: ""
  existingSecret: ""

api:
  enabled: true
  port: 8000
  host: 0.0.0.0
  replicas: 1
  corsOrigins: ["*"]
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: npm-scan.example.com
  tls: []

service:
  type: ClusterIP
  port: 80

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

nodeSelector: {}
tolerations: []
affinity: {}

redis:
  enabled: false
  host: ""
  port: 6379