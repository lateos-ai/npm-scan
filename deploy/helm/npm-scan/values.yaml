# Helm values for npm-scan BYOC
# Override per environment: helm install -f values-prod.yaml

image:
  repository: ghcr.io/lateos/npm-scan
  tag: latest
  pullPolicy: Always

replicaCount: 1

license:
  key: ""
  secret: ""

premium:
  enabled: false
  edition: premium
  byoc:
    enabled: false
    cloudProvider: ""
    vpcId: ""
    region: ""
    clusterName: ""
    externalDb: true
    externalRedis: true

siem:
  enabled: false
  type: cef
  endpoint: ""
  port: 514
  protocol: tcp
  apiKey: ""

pdf:
  enabled: false

sso:
  enabled: false
  provider: oidc
  clientId: ""
  clientSecret: ""
  issuerUrl: ""
  allowedDomains: []

postgresql:
  enabled: true
  host: ""
  port: 5432
  database: npm_scan
  username: npm_scan
  password: ""
  existingSecret: ""

api:
  enabled: true
  port: 8000
  host: 0.0.0.0
  replicas: 1
  corsOrigins: ["*"]
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: npm-scan.example.com
  tls: []

service:
  type: ClusterIP
  port: 80

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

nodeSelector: {}
tolerations: []
affinity: {}

redis:
  enabled: false
  host: ""
  port: 6379